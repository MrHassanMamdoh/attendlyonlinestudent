<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal — Email Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>
  <div class="bg-grid"></div>

  <div class="portal-wrapper">

    <div class="logo-strip">
      <img src="Attendly.png" alt="School Logo 1" onerror="this.style.opacity='.25'" />
      <div class="logo-sep"></div>
      <img src="unnamed (2).png" alt="School Logo 2" onerror="this.style.opacity='.25'" />
    </div>

    <div class="glass-card">
      <div class="badge-pill">
        <div class="badge-dot"></div>Student Portal
      </div>
      <h1 class="card-title">Recover Your<br><span class="grad">Email Password</span></h1>
      <p class="card-subtitle">الصف الاول والثاني الثانوي </p>

      <label class="field-label" for="gradeSelect">Grade / Class</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24">
          <path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z" />
          <path d="M6 12v5c3 3 9 3 12 0v-5" />
        </svg>
        <select class="field-input field-select" id="gradeSelect">
          <option value="" disabled selected>Select your grade…</option>
          <option value="5">أولى ثانوي</option>
          <option value="6">تانية ثانوي رياضيات</option>
          <option value="7">تانية ثانوي ميكانيكا</option>
        </select>
        <svg class="chevron-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </div>

      <label class="field-label" for="studentPhone">Student Phone Number</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24">
          <rect x="5" y="2" width="14" height="20" rx="2" />
          <circle cx="12" cy="17" r="1" fill="currentColor" />
        </svg>
        <input class="field-input" type="tel" id="studentPhone" placeholder="e.g. 010-1234-5678" autocomplete="off" />
      </div>

      <label class="field-label" for="parentPhone">Parent Phone Number</label>
      <div class="field-wrap">
        <svg class="field-icon" viewBox="0 0 24 24">
          <path
            d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 2.08 4.18 2 2 0 0 1 4.06 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
        </svg>
        <input class="field-input" type="tel" id="parentPhone" placeholder="e.g. 010-9876-5432" autocomplete="off" />
      </div>

      <div class="divider"></div>

      <button class="btn-go" id="submitBtn">
        Show Email Password
      </button>

      <div id="result-box" style="display:none">
        <div class="result-inner anim">
          <div class="result-tag"><span class="check">✓</span> Password Retrieved</div>

          <!-- إضافة بيانات الطالب -->
          <p style="color: white;">الاسم: <span id="studentName">N/A</span></p>
          <p style="color: white;">كود الطالب: <span id="studentCode">N/A</span></p>
          <p style="color: white;">كلمة السر: <span id="pwDisplay">••••••••</span></p>
          <p style="color: white;">كشف: <span id="kashfNumber">N/A</span></p>

          <div class="result-note">🔒 Keep this private — do not share with anyone.</div>
        </div>
      </div>

      <div id="error-box" style="display:none">
        <div class="error-inner anim">
          <div class="err-icon">⚠</div>
          <span id="errMsg">No record found. Please verify your phone numbers and try again.</span>
        </div>
      </div>

    </div>

    <script type="module" src="app.js"></script>
</body>


</html>
